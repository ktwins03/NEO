
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>코페르니쿠스 마린 데이터 제어 패널</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding: 50px; }
        .map-container { display: inline-block; cursor: pointer; border: 3px solid #334155; border-radius: 15px; overflow: hidden; }
        .map-container:hover { border-color: #38bdf8; }
    </style>
</head>
<body>

    <h1>데이터 제어 패널</h1>
    <div style="margin-bottom: 30px;">
        수심(m): <input type="number" id="depth" value="-40" style="width:60px;">
        날짜: <input type="date" id="date" value="2025-11-15">
    </div>

    <!-- 서/남해 영역 (6732.jpg 클릭) -->
    <div class="map-container" onclick="openCorrectViewer()">
        <img src="6732.jpg" alt="West/South Sea" width="600">
        <div style="background:#1e293b; padding:10px;">클릭하여 서·남해 데이터 보기</div>
    </div>

<script>
function openCorrectViewer() {
    const depth = document.getElementById('depth').value;
    const dateVal = document.getElementById('date').value;
    const timestamp = new Date(`${dateVal}T12:00:00`).getTime();

    // 핵심: 레이어 코드를 직접 넣지 않고 서버가 지원하는 뷰어 주소 체계 사용
    // layers 파라미터를 강제로 빼버리면 뷰어가 기본 상태로 로드됩니다.
    const baseUrl = "https://data.marine.copernicus.eu/viewer/expert";
    const url = `${baseUrl}?view=viewer&crs=epsg:4326&t=${timestamp}&z=${depth}&center=122.78,33.85&zoom=13&basemap=bathymetry`;
    
    window.open(url, '_blank');
}
</script>
</body>
</html>
