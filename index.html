<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해군 해양정보 체험용 어플리케이션</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 40px 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #38bdf8; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .control-panel { padding: 25px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; margin-bottom: 30px; display: inline-block; text-align: left; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; box-sizing: border-box; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #cbd5e1; display: inline-block; width: 140px; }
        input { padding: 8px 12px; background-color: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #f8fafc; font-size: 1rem; }
        input:focus { outline: none; border-color: #38bdf8; }
        .section-title { margin-top: 50px; margin-bottom: 15px; font-size: 1.25rem; color: #cbd5e1; font-weight: bold; }
        .map-link-container { display: inline-block; position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); transition: transform 0.3s ease; cursor: pointer; margin-bottom: 20px; max-width: 100%; }
        .map-link-container:hover { transform: scale(1.02); }
        .map-screenshot { display: block; max-width: 100%; height: auto; border: 2px solid #334155; border-radius: 12px; }
        .hover-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); padding: 20px; font-size: 1.1rem; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Navy Expert for Oceanography (NEO)</h1>
    <p>아래에서 수심과 날짜를 지정한 후, 원하는 해역의 지도를 클릭하면 해당 조건으로 뷰어가 열립니다.</p>
    <p>* 제작 : 길범준  / 데이터 출처 : Copernicus Marine MyOcean Viewer </p>

    <div class="control-panel">
        <div class="form-group">
            <label for="depthInput">수심 입력 (m):</label>
            <input type="number" id="depthInput" value="-40" style="width: 100px;">
        </div>
        <div class="form-group">
            <label for="dateInput">날짜 입력:</label>
            <input type="date" id="dateInput" value="2025-11-15">
        </div>
    </div>

    <div class="section-title">📍 동해 및 주변 해역의 해수 특성 관찰</div>
    <div class="map-link-container" onclick="openViewer('eastSea')">
        <img src="screen.png" alt="East Sea Map" class="map-screenshot">
        <div class="hover-overlay">🔍 클릭하여 동해 지도로 이동하기</div>
    </div>

    <div class="section-title" style="color: #38bdf8;">📍 서·남해 일대의 수온과 해류 구조 관찰</div>
    <div class="map-link-container" onclick="openViewer('westSouthSea')">
        <img src="screen11.jpg" alt="West/South Sea Map" class="map-screenshot">
        <div class="hover-overlay">🔍 클릭하여 서·남해 지도로 이동하기</div>
    </div>

    <!-- 추가된 맨 아래 새로운 섹션 -->
    <div class="section-title" style="color: #38bdf8;">📍 한반도 근해 바람 및 파고를 알아봅시다.</div>
    <div class="map-link-container" onclick="openViewer('koreaWindWave')">
        <img src="screen11.jpg" alt="Korea Wind and Wave Map" class="map-screenshot">
        <div class="hover-overlay">🔍 클릭하여 한반도 근해 바람 및 파고 뷰어로 이동하기</div>
    </div>
</div>

    url.searchParams.set("crs", "epsg:4326");
    url.searchParams.set("t", timestamp); // 기본적으로 입력한 날짜 연동

    }
    
    window.open(url.toString(), '_blank');
}
</script>

</body>
</html>
