<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코페르니쿠스 마린 데이터 제어 패널</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .control-panel {
            padding: 25px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 30px;
            display: inline-block;
            text-align: left;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            box-sizing: border-radius;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            color: #cbd5e1;
            display: inline-block;
            width: 140px;
        }
        input {
            padding: 8px 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Copernicus Marine Expert Viewer</h1>
    <p>수심과 날짜를 입력한 후 버튼을 누르면 해당 뷰어로 연결됩니다.</p>

    <div class="control-panel">
        <div class="form-group">
            <label for="depthInput">수심 입력 (m):</label>
            <input type="number" id="depthInput" value="-200" style="width: 100px;">
        </div>
        
        <div class="form-group">
            <label for="dateInput">날짜 입력:</label>
            <input type="date" id="dateInput" value="2026-05-18">
        </div>

        <div class="form-group" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
            <label for="layerInput" style="width: 100%; margin-bottom: 5px; color: #94a3b8; font-size: 0.85rem;">
                💡 레이어가 안 뜰 때만: CMEMS 주소의 'layers=' 뒷부분 붙여넣기
            </label>
            <input type="text" id="layerInput" value="H4sIAMe1PGoAA6WQT0.CQBDFv8ueK2y3FEpvFRVJUIj1QoyZrNuhNNl2yHYLVsJ3d4EoBwkXD3N58_e9_b3tGNkVmhGRyWoW7.Yeo7VUhW1ZzDuRx7Rs0UwyFrPxdHabTCF5TqaLdJI_zF7uR0n6CvPHBXDuAxe9riqxrKGkDHJNsF61N_66lQSyWirgHR4FGeYw9_9uShBug.e7pwnmsa9JleEniyPuseLgCJo7WVOeKqmRxUupa3RCka.s2FCzPub63VekyZTypBpZVB_0dfJG6gafiurwUBgI7od94fddBcPhT1c6W9Hxe1EQ8oEbCAaCD.bedToi.D8e1ZhrbGqUsJUWDWxQ09H4zGl45iQucaptq3EujS2URhffmuYvvQsO_.dvzBHUqBcCAAA-" style="width: 95%; font-size: 0.8rem; color: #64748b;">
        </div>
        
        <button class="btn-submit" onclick="openViewer()">입력한 조건으로 뷰어 열기 (새 창)</button>
    </div>
</div>

<script>
function openViewer() {
    const depthEl = document.getElementById('depthInput');
    const dateEl = document.getElementById('dateInput');
    const layerEl = document.getElementById('layerInput');
    
    let depth = depthEl.value.trim();
    if (depth === "") depth = "0";
    
    const dateVal = dateEl.value;
    if (!dateVal) {
        alert("날짜를 올바르게 입력해주세요.");
        return;
    }
    
    // 시간대 밀림 방지 - 기본 UTC 표준시 변환 지원식으로 변경
    const timestamp = new Date(dateVal).getTime();
    
    if (isNaN(timestamp)) {
        alert("잘못된 날짜 형식입니다.");
        return;
    }
    
    // 사용자가 입력창에 넣어둔 최신 레이어 문자열을 가져옴
    const baseLayers = layerEl.value.trim();
    
    const newUrl = `https://data.marine.copernicus.eu/viewer/expert?view=viewer&crs=epsg%3A4326&t=${timestamp}&z=${depth}&center=130.16038204953057%2C39.0627401581225&zoom=14.583824767779062&layers=${baseLayers}&basemap=dark`;
    
    window.open(newUrl, '_blank');
}
</script>

</body>
</html>
