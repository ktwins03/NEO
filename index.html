<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코페르니쿠스 마린 데이터 제어 패널</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .control-panel {
            padding: 25px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 30px;
            display: inline-block;
            text-align: left;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            box-sizing: border-box; /* 오타 수정: 블록 크기 계산 정상화 */
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            color: #cbd5e1;
            display: inline-block;
            width: 140px;
        }
        input {
            padding: 8px 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .btn-submit:hover {
            background-color: #7dd3fc;
        }

        /* [추가 및 복구] 지도 이미지 스타일 선언부 */
        .map-link-container {
            display: inline-block;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            margin-top: 20px;
            max-width: 100%;
        }
        .map-link-container:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.3);
        }
        .map-screenshot {
            display: block;
            max-width: 100%;
            height: auto;
            border: 2px solid #334155;
            border-radius: 12px;
        }
        .hover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(15, 23, 42, 0.9));
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Navy Expert for Oceanography (NEO)</h1>
    <p>여름철 동해의 수온전선, 한류와 난류 분포를 관찰해봅시다. 수심과 날짜를 입력한 후 버튼을 누르거나, 아래 지도를 클릭하면 해당 뷰어로 연결됩니다.(제작 : 길범준 / 출처 : Copernicus Marine MyOcean Viewer)
</p>

    <div class="control-panel">
        <div class="form-group">
            <label for="depthInput">수심 입력 (m):</label>
            <input type="number" id="depthInput" value="-100" style="width: 100px;">
        </div>
        
        <div class="form-group">
            <label for="dateInput">날짜 입력:</label>
            <input type="date" id="dateInput" value="2025-07-05">
        </div>

        <div class="form-group" style="margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px;">
            <label for="layerInput" style="width: 100%; margin-bottom: 5px; color: #94a3b8; font-size: 0.85rem;">
                💡 레이어가 안 뜰 때만: CMEMS 주소의 'layers=' 뒷부분 붙여넣기
            </label>
            <input type="text" id="layerInput" value="H4sIAMe1PGoAA6WQT0.CQBDFv8ueK2y3FEpvFRVJUIj1QoyZrNuhNNl2yHYLVsJ3d4EoBwkXD3N58_e9_b3tGNkVmhGRyWoW7.Yeo7VUhW1ZzDuRx7Rs0UwyFrPxdHabTCF5TqaLdJI_zF7uR0n6CvPHBXDuAxe9riqxrKGkDHJNsF61N_66lQSyWirgHR4FGeYw9_9uShBug.e7pwnmsa9JleEniyPuseLgCJo7WVOeKqmRxUupa3RCka.s2FCzPub63VekyZTypBpZVB_0dfJG6gafiurwUBgI7od94fddBcPhT1c6W9Hxe1EQ8oEbCAaCD.bedToi.D8e1ZhrbGqUsJUWDWxQ09H4zGl45iQucaptq3EujS2URhffmuYvvQsO_.dvzBHUqBcCAAA-" style="width: 95%; font-size: 0.8rem; color: #64748b;">
        </div>
        
        <button class="btn-submit" onclick="openViewer()">입력한 조건으로 뷰어 열기 (새 창)</button>
    </div>

    <br>

    <div class="map-link-container" onclick="openViewer()">
        <img src="screen.png" alt="Copernicus Map Screenshot" class="map-screenshot">
        <div class="hover-overlay">
            🔍 클릭하여 입력한 조건의 지도로 이동하기
        </div>
    </div>
</div>

<script>
function openViewer() {
    const depthEl = document.getElementById('depthInput');
    const dateEl = document.getElementById('dateInput');
    const layerEl = document.getElementById('layerInput');
    
    let depth = depthEl.value.trim();
    if (depth === "") depth = "0";
    
    const dateVal = dateEl.value;
    if (!dateVal) {
        alert("날짜를 올바르게 입력해주세요.");
        return;
    }
    
    // [보완] 크롬 및 타 브라우저 시차 오류 원천 차단 (낮 12시 기준 타임스탬프 발행)
    const safeDateStr = `${dateVal}T12:00:00`;
    const timestamp = new Date(safeDateStr).getTime();
    
    if (isNaN(timestamp)) {
        alert("잘못된 날짜 형식입니다.");
        return;
    }
    
    const baseLayers = layerEl.value.trim();
    
    const newUrl = `https://data.marine.copernicus.eu/viewer/expert?view=viewer&crs=epsg%3A4326&t=${timestamp}&z=${depth}&center=130.16038204953057%2C39.0627401581225&zoom=14.583824767779062&layers=${baseLayers}&basemap=dark`;
    
    window.open(newUrl, '_blank');
}
</script>

</body>
</html>
