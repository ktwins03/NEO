<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코페르니쿠스 마린 데이터 제어 패널</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }
        .control-panel {
            padding: 25px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            margin-bottom: 30px;
            display: inline-block;
            text-align: left;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            box-sizing: border-box;
            max-width: 500px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            font-weight: bold;
            color: #cbd5e1;
            display: inline-block;
            width: 140px;
        }
        input {
            padding: 8px 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #f8fafc;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        
        .section-title {
            margin-top: 50px;
            margin-bottom: 15px;
            font-size: 1.25rem;
            color: #cbd5e1;
            font-weight: bold;
        }

        .map-link-container {
            display: inline-block;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
            max-width: 100%;
        }
        .map-link-container:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.3);
        }
        .map-screenshot {
            display: block;
            max-width: 100%;
            height: auto;
            border: 2px solid #334155;
            border-radius: 12px;
        }
        .hover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(15, 23, 42, 0.9));
            padding: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Copernicus Marine Expert Viewer</h1>
    <p>아래에서 수심과 날짜를 지정한 후, 원하는 해역의 지도를 클릭하면 해당 조건으로 뷰어가 열립니다.</p>

    <!-- 제어 패널 (공통 설정) -->
    <div class="control-panel">
        <div class="form-group">
            <label for="depthInput">수심 입력 (m):</label>
            <input type="number" id="depthInput" value="-200" style="width: 100px;">
        </div>
        
        <div class="form-group">
            <label for="dateInput">날짜 입력:</label>
            <input type="date" id="dateInput" value="2026-05-18">
        </div>
    </div>

    <!-- 1지역: 동해 일대 관찰 -->
    <div class="section-title">📍 동해 및 주변 해역의 해수 특성 관찰</div>
    <div class="map-link-container" onclick="openViewer('eastSea')">
        <img src="screen.png" alt="East Sea Map" class="map-screenshot">
        <div class="hover-overlay">
            🔍 클릭하여 지정한 조건의 동해 지도로 이동하기
        </div>
    </div>

    <!-- 2지역: 서·남해 일대 관찰 -->
    <div class="section-title" style="color: #38bdf8;">📍 다음은 서.남해 일대의 수온과 해류 구조를 관찰해봅시다.</div>
    <div class="map-link-container" onclick="openViewer('westSouthSea')">
        <!-- screen11.jpg 적용 완료 -->
        <img src="screen11.jpg" alt="West/South Sea Map" class="map-screenshot">
        <div class="hover-overlay">
            🔍 클릭하여 지정한 조건의 서·남해 지도로 이동하기
        </div>
    </div>
</div>

<script>
function openViewer(region) {
    const depthEl = document.getElementById('depthInput');
    const dateEl = document.getElementById('dateInput');
    
    let depth = depthEl.value.trim();
    if (depth === "") depth = "0";
    
    const dateVal = dateEl.value;
    if (!dateVal) {
        alert("날짜를 올바르게 입력해주세요.");
        return;
    }
    
    const safeDateStr = `${dateVal}T12:00:00`;
    const timestamp = new Date(safeDateStr).getTime();
    
    if (isNaN(timestamp)) {
        alert("잘못된 날짜 형식입니다.");
        return;
    }
    
    // URL 조립 오류를 원천 차단하는 가장 안전한 URL 객체 방식 사용
    const url = new URL("https://data.marine.copernicus.eu/viewer/expert");
    url.searchParams.set("view", "viewer");
    url.searchParams.set("crs", "epsg:4326");
    url.searchParams.set("t", timestamp);
    url.searchParams.set("z", depth);

    if (region === 'eastSea') {
        url.searchParams.set("center", "130.16038204953057,39.0627401581225");
        url.searchParams.set("zoom", "14.583824767779062");
        url.searchParams.set("layers", "H4sIAMe1PGoAA6WQT0.CQBDFv8ueK2y3FEpvFRVJUIj1QoyZrNuhNNl2yHYLVsJ3d4EoBwkXD3N58_e9_b3tGNkVmhGRyWoW7.Yeo7VUhW1ZzDuRx7Rs0UwyFrPxdHabTCF5TqaLdJI_zF7uR0n6CvPHBXDuAxe9riqxrKGkDHJNsF61N_66lQSyWirgHR4FGeYw9_9uShBug.e7pwnmsa9JleEniyPuseLgCJo7WVOeKqmRxUupa3RCka.s2FCzPub63VekyZTypBpZVB_0dfJG6gafiurwUBgI7od94fddBcPhT1c6W9Hxe1EQ8oEbCAaCD.bedToi.D8e1ZhrbGqUsJUWDWxQ09H4zGl45iQucaptq3EujS2URhffmuYvvQsO_.dvzBHUqBcCAAA-");
        url.searchParams.set("basemap", "dark");
    } 
    else if (region === 'westSouthSea') {
        url.searchParams.set("center", "122.78211050504403,33.858696115669225");
        url.searchParams.set("zoom", "13.75413737458402");
        url.searchParams.set("layers", "H4sIAHbdP2oAA6WSX0.CMBTFv0ufx_i.sXZviAokKMT5Qoxp6lZgSUdJN0AkfHe7ER2JkxdeT3vPufd379sRmHKl7MAYmxYgOp48YDYyycoDiKDPPKDlQdlxCiIwnEzv_hPRf_5P5vE4fpy_PAz68auYjeYCQiQgpt0kV3khcpOKpTZiszp0nHspjZDrRSKgDxlJ1VLM0H0nF9hVwF73.AN44Gu8TtUniBj0QFYlCg2drM0yTqRWIFpIXSgnZMtVObRmu6n7_q1PjDY2l2fVymz9YfZO3km9VU.ZGkTIhxwFIUSEcYJwSOnPq3SxGPnEPRPMeMgpx.jkXaeDg9vxJFt7jU2hpNjLUlmxU9rUwQ0n3nDCbZyK8qDVTNoyS7Ry7Zd2_5dea0JdGRtduddmrShunb24ehbF5UmEzaiobdRmx5j7mGEeIBJQziANL1dMqN8jLCA0oAHjrNr.P0eTFaMsTZUzrKid3r8BjNPYySkDAAA-");
        url.searchParams.set("basemap", "bathymetry");
        url.searchParams.set("objv2", "H4sIAHbdP2oAA1VQ3WqDMBR_l1xtYCWJ8Se9G4yNQqFluyxSsvZoA5q4GGUyfPed6BhrbkLO93ty_ib6SrbkbCmJSAXKDw56ssW5nzpA5GWdIVqDbcG7iWz.wKPVxiN0sdZdtVF_0TIu4jQRGc2iRMS0yBOalHNEOmc7cF4H0l2uUW1wOz_ReS4xyKnutnDONQtXq7q9msDtFkkTJAvnvYPLMhsfbo847IePHvyzbt.g8zCCc.q6ZkEDo.LamvBwytQYd9owSqMNjYUUlAdamvBwytQYd9owSqMNjYUUl");
    }
    
    // 완성된 URL로 새창 열기
    window.open(url.toString(), '_blank');
}
</script>

</body>
</html>
